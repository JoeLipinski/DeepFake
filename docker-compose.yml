version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENV=production
      - MAX_UPLOAD_MB=20
      - JOB_TTL_HOURS=24
      - WORKERS=1
      - CUDA_VISIBLE_DEVICES=0
      - DEPTH_MODEL_ID=depth-anything/Depth-Anything-V2-Large-hf
      - CORS_ORIGINS=http://localhost:80
    volumes:
      - job_storage:/app/jobs
      - model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:80
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  job_storage:
  model_cache:
